<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="960" height="700">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #1e293b; }
    .node-label { font-size: 14px; font-weight: 600; fill: #1e293b; }
    .sub-label { font-size: 12px; fill: #64748b; }
    .arrow-label { font-size: 11px; fill: #475569; }
  </style>
  <rect width="960" height="700" fill="#ffffff"/>
  <text x="480" y="48" text-anchor="middle" class="title">{{TITLE}}</text>

  <rect x="400" y="88" width="160" height="48" rx="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="480" y="118" text-anchor="middle" class="node-label">Start</text>

  <rect x="370" y="188" width="220" height="64" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="480" y="214" text-anchor="middle" class="node-label">Validate Input</text>
  <text x="480" y="234" text-anchor="middle" class="sub-label">Check required fields</text>

  <polygon points="480,306 590,370 480,434 370,370" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="480" y="366" text-anchor="middle" class="node-label">Valid?</text>
  <text x="480" y="386" text-anchor="middle" class="sub-label">yes / no</text>

  <rect x="650" y="338" width="190" height="64" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="745" y="364" text-anchor="middle" class="node-label">Return Error</text>
  <text x="745" y="384" text-anchor="middle" class="sub-label">Explain failure</text>

  <rect x="370" y="500" width="220" height="64" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="480" y="526" text-anchor="middle" class="node-label">Process Request</text>
  <text x="480" y="546" text-anchor="middle" class="sub-label">Run main action</text>

  <rect x="400" y="612" width="160" height="48" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="480" y="642" text-anchor="middle" class="node-label">Done</text>

  <path d="M 480 136 L 480 188" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 480 252 L 480 306" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 590 370 L 650 370" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="608" y="350" width="28" height="18" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="622" y="363" text-anchor="middle" class="arrow-label">no</text>
  <path d="M 480 434 L 480 500" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="494" y="456" width="34" height="18" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="511" y="469" text-anchor="middle" class="arrow-label">yes</text>
  <path d="M 480 564 L 480 612" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
</svg>
